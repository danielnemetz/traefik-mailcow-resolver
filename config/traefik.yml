api:
  insecure: true
  dashboard: true

entryPoints:
  web:
    address: ":80"
  websecure:
    address: ":443"

providers:
  docker:
    exposedByDefault: false

# Resolver "ionos" muss hier stehen (Router-Labels verweisen darauf).
# E-Mail wird per CLI aus .env überschrieben: --certificatesresolvers.ionos.acme.email
certificatesResolvers:
  ionos:
    acme:
      email: "acme@local"
      storage: /data/acme.json
      dnsChallenge:
        provider: ionos
